<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Contacts</title>
    <!-- Un peu de style pour que ce soit lisible -->
    <style>
        body      { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; }
        input     { padding: 8px; margin: 4px; }
        button    { padding: 8px 16px; cursor: pointer; }
        table     { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td, th    { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th        { background: #f5f5f5; }
        a         { color: red; text-decoration: none; }
    </style>
</head>
<body>

    <h1>📋 Mes Contacts</h1>

    <!-- Formulaire pour ajouter un contact -->
    <!-- Quand on clique sur le bouton, ça envoie les données à /ajouter -->
    <form action="/ajouter" method="POST">
        <input type="text" name="nom"       placeholder="Nom"       required>
        <input type="text" name="telephone" placeholder="Téléphone" required>
        <button type="submit">Ajouter</button>
    </form>

    <!-- Liste des contacts -->
    <table>
        <tr>
            <th>Nom</th>
            <th>Téléphone</th>
            <th>Action</th>
        </tr>

        <!-- Jinja2 : on boucle sur tous les contacts envoyés par Flask -->
        {% for contact in contacts %}
        <tr>
            <!-- contact[1] = nom, contact[2] = téléphone, contact[0] = id -->
            <td>{{ contact[1] }}</td>
            <td>{{ contact[2] }}</td>
            <td><a href="/supprimer/{{ contact[0] }}">Supprimer</a></td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
