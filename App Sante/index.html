<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title> MédicInfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> MédicInfo</h1>
        <h3>Saisir le nom (en anglais) d'un médicament pour voir ses informations</h3>
        
        <div class="search-box">
            <input type="text" id="medicament" placeholder="Ex: aspirin, ibuprofen...">
            <button onclick="chercher()">Rechercher</button>
        </div>

        <div id="resultat">
            <div class="card" style="text-align:center; color:#666;">
                 Tapez un nom de médicament
            </div>
        </div>
        
        <div class="footer">
            
            <p> 2026 MédicInfo - Données issues de la FDA</p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
